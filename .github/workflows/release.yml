name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install syft (for SBOM generation)
        uses: anchore/sbom-action/download-syft@v0

      - name: Debug HOMEBREW_TAP_GITHUB_TOKEN secret (length + sha256 fingerprint only)
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            echo "::error::HOMEBREW_TAP_GITHUB_TOKEN secret is EMPTY or not set"
            exit 1
          fi
          echo "length=${#HOMEBREW_TAP_GITHUB_TOKEN}"
          echo "sha256=$(printf %s "$HOMEBREW_TAP_GITHUB_TOKEN" | sha256sum | cut -c1-12)"

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required only if publishing the Homebrew formula to a separate tap repo.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
