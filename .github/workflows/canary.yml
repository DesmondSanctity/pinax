name: canary

on:
  schedule:
    # Sundays at 09:00 UTC.
    - cron: "0 9 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  probe:
    name: probe reference sites
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true

      - name: install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: build pinax
        run: go build -trimpath -o ./pinax ./cmd/pinax

      - name: probe sites
        id: probe
        env:
          HOME: ${{ runner.temp }}/pinax-home
        run: |
          set -uo pipefail
          mkdir -p "$HOME"
          mkdir -p reports
          failures=()
          count=$(yq '.sites | length' .github/canary-sites.yml)
          for i in $(seq 0 $((count - 1))); do
            url=$(yq -r ".sites[$i].url" .github/canary-sites.yml)
            min_pages=$(yq -r ".sites[$i].minPages" .github/canary-sites.yml)
            min_prose=$(yq -r ".sites[$i].minProse" .github/canary-sites.yml)
            platform=$(yq -r ".sites[$i].platform" .github/canary-sites.yml)
            # Mirror cmd/pinax.deriveName: strip scheme + path, dots -> dashes.
            name=$(echo "$url" | sed -E 's#^https?://##; s#/.*##; s#\.#-#g')
            echo "::group::$url ($platform)"
            if ! ./pinax add "$url" 2>&1 | tee "reports/add-$i.log"; then
              echo "::error::pinax add failed for $url"
              failures+=("$url|add failed|see reports/add-$i.log")
              echo "::endgroup::"
              continue
            fi
            if ! ./pinax doctor "$name" --json > "reports/doctor-$i.json" 2> "reports/doctor-$i.err"; then
              cat "reports/doctor-$i.err"
            fi
            pages=$(jq -r '.currentPages // 0' "reports/doctor-$i.json")
            prose=$(jq -r '.preflight.meanProseLen // 0' "reports/doctor-$i.json")
            ratio=$(jq -r '.preflight.meanRatio // 0' "reports/doctor-$i.json")
            echo "pages=$pages min=$min_pages prose=$prose min=$min_prose ratio=$ratio"
            if [ "$pages" -lt "$min_pages" ]; then
              failures+=("$url|pages $pages < $min_pages|platform=$platform")
            fi
            if [ "$prose" -lt "$min_prose" ]; then
              failures+=("$url|mean prose $prose < $min_prose|platform=$platform")
            fi
            ./pinax remove "$name" >/dev/null 2>&1 || true
            echo "::endgroup::"
          done
          {
            echo "# Canary report"
            echo
            if [ "${#failures[@]}" -eq 0 ]; then
              echo "All $count sites healthy."
            else
              echo "Regressions on ${#failures[@]} of $count sites:"
              echo
              echo "| site | issue | notes |"
              echo "| ---- | ----- | ----- |"
              for f in "${failures[@]}"; do
                IFS='|' read -r site issue notes <<< "$f"
                echo "| $site | $issue | $notes |"
              done
            fi
          } | tee "$GITHUB_STEP_SUMMARY" > reports/summary.md
          if [ "${#failures[@]}" -gt 0 ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: canary-reports
          path: reports/

      - name: open issue on regression
        if: steps.probe.outputs.failed == 'true' && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          today=$(date -u +%Y-%m-%d)
          gh issue create \
            --title "canary: docs regression on $today" \
            --label canary \
            --body-file reports/summary.md
