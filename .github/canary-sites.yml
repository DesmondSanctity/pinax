# Sites probed by the weekly canary CI job.
# Each entry asserts that `pinax add <url>` produces at least
# minPages and that the mean prose length is at least minProse.
# Add platform notes so regressions point at a likely culprit.
sites:
  - url: https://docs.stripe.com
    platform: custom
    minPages: 200
    minProse: 500
  - url: https://docs.convex.dev
    platform: docusaurus+llms.txt
    minPages: 100
    minProse: 500
  - url: https://resend.com/docs
    platform: mintlify
    minPages: 50
    minProse: 500
  - url: https://modal.com/docs
    platform: custom
    minPages: 30
    minProse: 300
  - url: https://react.dev/learn
    platform: custom+llms.txt
    minPages: 30
    minProse: 300
  - url: https://nextjs.org/docs
    platform: nextra
    minPages: 50
    minProse: 300
  # docs.anthropic.com 301-redirects to platform.claude.com (cross-host),
  # which drops pages out of scope. Probe the new canonical host directly.
  - url: https://platform.claude.com/docs
    platform: mintlify
    minPages: 1400
    minProse: 5000
  # platform.openai.com/docs is a JS SPA — only the shell page renders without
  # a browser. Re-add to the canary once v0.5 Track B (renderer fallback) lands.
  # - url: https://platform.openai.com/docs
  #   platform: custom
  #   minPages: 20
  #   minProse: 300
  - url: https://vercel.com/docs
    platform: custom
    minPages: 50
    minProse: 300
  - url: https://docs.github.com
    platform: custom
    # github trimmed their llms.txt; currently emits 116 pages (was 200+).
    minPages: 100
    minProse: 500
  - url: https://supabase.com/docs
    platform: custom+llms.txt
    # supabase trimmed their llms.txt; currently emits 37 pages.
    minPages: 30
    minProse: 300
  - url: https://docs.python.org/3/
    platform: sphinx
    # python's sitemap.xml lists only the 8 per-version landing pages
    # (3.10..3.16) by design — no per-page sitemap exists upstream.
    minPages: 6
    minProse: 1000
  - url: https://agentfield.ai/docs/learn
    platform: docs-ai-json
    minPages: 8
    minProse: 3000
  - url: https://developers.buffer.com
    platform: custom+llms.txt+inline-md
    minPages: 40
    minProse: 3000
