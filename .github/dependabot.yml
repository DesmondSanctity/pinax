version: 2
updates:
 - package-ecosystem: gomod
   directory: '/'
   schedule:
    interval: weekly
   open-pull-requests-limit: 5
   groups:
    go-deps:
     patterns: ['*']
   commit-message:
    prefix: 'chore(deps)'

 - package-ecosystem: github-actions
   directory: '/'
   schedule:
    interval: weekly
   open-pull-requests-limit: 5
   groups:
    gha:
     patterns: ['*']
   commit-message:
    prefix: 'chore(ci)'
