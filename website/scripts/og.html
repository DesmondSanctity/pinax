<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
      :root {
        --bg: #faf7f1;
        --panel: #f2eee5;
        --fg: #1b1a17;
        --muted: #5a574f;
        --hairline: #e5dfd2;
        --primary: #1e3a8a;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1200px;
        height: 630px;
        background: var(--bg);
        color: var(--fg);
        font-family:
          'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .frame {
        width: 1200px;
        height: 630px;
        padding: 80px 72px;
        display: grid;
        grid-template-rows: auto 1fr auto auto;
        gap: 32px;
      }
      .kicker {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 3.6px;
        color: var(--muted);
        text-transform: uppercase;
        padding-top: 16px;
        border-top: 1px solid var(--hairline);
      }
      .stage {
        display: flex;
        align-items: center;
        gap: 32px;
        padding-top: 12px;
      }
      .mark {
        flex: 0 0 auto;
      }
      .wordmark {
        font-family:
          'Source Serif 4', 'Source Serif Pro', 'Newsreader', ui-serif, Georgia, 'Times New Roman',
          serif;
        font-weight: 500;
        font-size: 140px;
        line-height: 0.9;
        letter-spacing: -3px;
        color: var(--fg);
        margin: 0;
      }
      .tagline {
        font-family:
          'Source Serif 4', 'Source Serif Pro', 'Newsreader', ui-serif, Georgia, 'Times New Roman',
          serif;
        font-size: 44px;
        line-height: 1.2;
        letter-spacing: -0.5px;
        color: var(--fg);
        margin: 16px 0 0 0;
        font-weight: 400;
      }
      .tagline .muted {
        color: var(--muted);
      }
      .cmd {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--panel);
        border: 1px solid var(--hairline);
        border-radius: 10px;
        padding: 18px 22px;
        width: 620px;
        font-family:
          'JetBrains Mono', 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 24px;
        color: var(--fg);
      }
      .cmd .prompt {
        color: var(--muted);
      }
      .footline {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 16px;
        border-top: 1px solid var(--hairline);
        font-family:
          'JetBrains Mono', 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 14px;
        letter-spacing: 2px;
        color: var(--muted);
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="kicker">Local MCP server for docs</div>

      <div class="stage">
        <svg
          class="mark"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 32 32"
          width="180"
          height="180"
          aria-hidden="true"
        >
          <rect width="32" height="32" rx="6" fill="#FAF7F1" />
          <rect x="6" y="6" width="20" height="20" rx="3" fill="#1E3A8A" />
          <path d="M11 11h6a3 3 0 1 1 0 6h-2v4h-4z" fill="#FAF7F1" />
          <circle cx="17" cy="14" r="1" fill="#1E3A8A" />
        </svg>
        <div>
          <h1 class="wordmark">Pinax</h1>
          <p class="tagline">
            Any docs site. A local MCP server.<br />
            <span class="muted">Under a minute.</span>
          </p>
        </div>
      </div>

      <div class="cmd"><span class="prompt">$</span> pinax add stripe</div>

      <div class="footline">
        <span>pinax.pages.dev</span>
        <span>Open source &nbsp;·&nbsp; MIT</span>
      </div>
    </div>
  </body>
</html>
