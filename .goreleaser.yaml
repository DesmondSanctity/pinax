version: 2

project_name: pinax

before:
 hooks:
  - go mod tidy

builds:
 - id: pinax
   main: ./cmd/pinax
   binary: pinax
   env:
    - CGO_ENABLED=0
   goos: [linux, darwin, windows]
   goarch: [amd64, arm64]
   ignore:
    - goos: windows
      goarch: arm64
   flags:
    - -trimpath
   ldflags:
    - -s -w
    - -X pinax/internal/buildinfo.Version={{ .Version }}
    - -X pinax/internal/buildinfo.Commit={{ .Commit }}
    - -X pinax/internal/buildinfo.Date={{ .Date }}

archives:
 - id: default
   name_template: >-
    {{ .ProjectName }}_{{ .Version }}_
    {{- title .Os }}_
    {{- if eq .Arch "amd64" }}x86_64
    {{- else if eq .Arch "386" }}i386
    {{- else }}{{ .Arch }}{{ end }}
   format_overrides:
    - goos: windows
      formats: [zip]
   files:
    - README.md
    - LICENSE
    - CHANGELOG.md

checksum:
 name_template: 'checksums.txt'

snapshot:
 version_template: '{{ incpatch .Version }}-next'

sboms:
 - artifacts: archive

changelog:
 use: github-native
 sort: asc
 filters:
  exclude:
   - '^docs:'
   - '^test:'
   - '^chore:'
   - 'Merge pull request'
   - 'Merge branch'

release:
 draft: false
 prerelease: auto
 name_template: 'v{{ .Version }}'
 footer: |
  ---
  **Full changelog**: https://github.com/desmondsanctity/pinax/compare/{{ .PreviousTag }}...{{ .Tag }}

brews:
 - name: pinax
   repository:
    owner: desmondsanctity
    name: homebrew-tap
    token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
   homepage: 'https://github.com/desmondsanctity/pinax'
   description: 'Turn any documentation site into a local MCP server.'
   license: MIT
   test: |
    system "#{bin}/pinax", "--version"
   install: |
    bin.install "pinax"
